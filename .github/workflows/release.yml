name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Create macOS .app bundle
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Create DMG
        run: |
          APP_DIR="target/${{ matrix.target }}/release/bundle/osx"
          DMG_NAME="Awebo-${{ github.ref_name }}-${{ matrix.target }}.dmg"
          STAGING="$(mktemp -d)"

          cp -R "${APP_DIR}/Awebo.app" "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"

          hdiutil create -volname "Awebo" \
            -srcfolder "${STAGING}" \
            -ov -format UDZO \
            "${APP_DIR}/${DMG_NAME}"

          cd "${APP_DIR}"
          shasum -a 256 "${DMG_NAME}" > "${DMG_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awebo-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/osx/*.dmg
            target/${{ matrix.target }}/release/bundle/osx/*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
