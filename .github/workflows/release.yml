name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  build:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Create macOS .app bundle
        run: cargo bundle --release

      - name: Sign macOS .app bundle
        run: |
          xattr -cr target/release/bundle/osx/Awebo.app
          codesign --force --deep --sign - target/release/bundle/osx/Awebo.app

      - name: Create DMG
        run: |
          APP_DIR="target/release/bundle/osx"
          DMG_NAME="Awebo-${{ github.ref_name }}-aarch64-apple-darwin.dmg"
          STAGING="$(mktemp -d)"

          cp -R "${APP_DIR}/Awebo.app" "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"

          hdiutil create -volname "Awebo" \
            -srcfolder "${STAGING}" \
            -ov -format UDZO \
            "${APP_DIR}/${DMG_NAME}"

          cd "${APP_DIR}"
          shasum -a 256 "${DMG_NAME}" > "${DMG_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awebo-aarch64-apple-darwin
          path: |
            target/release/bundle/osx/*.dmg
            target/release/bundle/osx/*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
